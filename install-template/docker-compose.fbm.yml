# FBM channel overlay — additive Docker Compose override.
# Swaps goclaw + goclaw-ui to fork images (pull_policy: never — survives `docker compose pull`).
# Adds fbm-sidecar as new service.
#
# Generated by install-fbm-bundle.sh. Do not edit manually — re-run installer to regenerate.

services:
  goclaw:
    image: goclaw-fork:${FBM_BUNDLE_VERSION:-local}
    pull_policy: never
    depends_on:
      postgres:
        condition: service_healthy
      fbm-sidecar:
        condition: service_started

  goclaw-ui:
    image: goclaw-web-fork:${FBM_BUNDLE_VERSION:-local}
    pull_policy: never

  fbm-sidecar:
    image: fbm-sidecar:${FBM_BUNDLE_VERSION:-local}
    pull_policy: never
    container_name: fbm-sidecar
    ports:
      - "127.0.0.1:${FBM_PORT:-29320}:29320"
    environment:
      FBM_PORT: 29320
      FBM_AUTH_TOKEN: ${FBM_AUTH_TOKEN:?FBM_AUTH_TOKEN required in .env.fbm}
      FBM_HMAC_SECRET: ${FBM_HMAC_SECRET:?FBM_HMAC_SECRET required in .env.fbm}
      FBM_WEBHOOK_URL: http://goclaw:18790/channels/facebook_personal/${FBM_INSTANCE_NAME:-default}/webhook
      SYNAPSE_ADMIN_TOKEN: ${SYNAPSE_ADMIN_TOKEN:?SYNAPSE_ADMIN_TOKEN required in .env.fbm}
    volumes:
      - fbm-sidecar-data:/data
    networks:
      - default
      - goclaw-net
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -qO- --header=\"Authorization: Bearer $${FBM_AUTH_TOKEN}\" http://localhost:29320/healthz > /dev/null 2>&1 || exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    mem_limit: 1g
    pids_limit: 400

volumes:
  fbm-sidecar-data:

networks:
  goclaw-net:
    external: true
    name: goclaw-net
