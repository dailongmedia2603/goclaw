# Browser sidecar overlay — multi-profile browser support.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml -f docker-compose.browser.yml up -d --build
#
# Profiles:
#   "default" (chrome) — headless CloakBrowser for general web automation (CDP :9222)
#   "shopee"  (cloak-shopee) — CloakBrowser Manager with GUI + noVNC for manual login (:8686)
#
# Configure profiles in config.json → tools.browser.profiles

services:
  # Profile "default" — headless CloakBrowser (CDP server mode)
  chrome:
    image: cloakhq/cloakbrowser:latest
    command: ["cloakserve", "--host", "0.0.0.0", "--port", "9222"]
    environment:
      - DISPLAY=:99
    shm_size: 2gb
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9222/json/version >/dev/null 2>&1 || wget -qO- http://127.0.0.1:9222/json/version >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Profile "shopee" — CloakBrowser Manager with noVNC GUI for manual login
  # Access web UI at http://<host>:8686 to create profiles, log in manually, and get CDP URL.
  # Cookies persist in volume cloak-shopee-data across restarts.
  cloak-shopee:
    image: cloakhq/cloakbrowser-manager:latest
    ports:
      - "${CLOAK_SHOPEE_PORT:-8686}:8080"
    volumes:
      - cloak-shopee-data:/data
    shm_size: 2gb
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/ >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  goclaw:
    environment:
      - GOCLAW_BROWSER_REMOTE_URL=ws://chrome:9222
    depends_on:
      chrome:
        condition: service_healthy

volumes:
  cloak-shopee-data:
