name: FBM Bundle Release

# Build and attach FBM distribution bundles (Cách 1 tar + Cách 4 source) to releases.
# Triggers:
#   - Tag push: fbm-v* → build + create GitHub prerelease with artifacts
#   - Manual workflow_dispatch → build only (artifact retention 30d)

on:
  push:
    tags: ['fbm-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Bundle version (semver, no "v" prefix)'
        required: true
        default: '0.1.0-dev'

permissions:
  contents: write  # required for GitHub Release creation

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: docker/setup-buildx-action@v3

      - name: Install host deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq zstd

      - name: Determine version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            ver="${GITHUB_REF_NAME#fbm-v}"
            echo "version=$ver" >> "$GITHUB_OUTPUT"
          fi

      - name: Upstream-safety verify
        run: bash scripts/verify-fbm-upstream-safety.sh --local

      - name: Run FBM unit tests
        run: |
          go test -race -count=1 ./internal/channels/facebookmessenger/...
          (cd sidecar/mautrix-meta-shim && go test -race -count=1 ./...)

      - name: Build binary bundle (Cách 1)
        run: bash scripts/build-fbm-bundle.sh --version "${{ steps.ver.outputs.version }}"

      - name: Build source tarball (Cách 4)
        run: bash scripts/build-fbm-source-tarball.sh --version "${{ steps.ver.outputs.version }}"

      - name: List artifacts
        run: ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fbm-bundles-${{ steps.ver.outputs.version }}
          path: |
            dist/goclaw-fbm-bundle-*.tar.gz
            dist/goclaw-fbm-bundle-*.sha256
            dist/goclaw-fbm-source-*.tar.gz
            dist/goclaw-fbm-source-*.sha256
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/fbm-v')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            dist/goclaw-fbm-bundle-*.tar.gz
            dist/goclaw-fbm-bundle-*.sha256
            dist/goclaw-fbm-source-*.tar.gz
            dist/goclaw-fbm-source-*.sha256
          body: |
            # FBM bundle ${{ steps.ver.outputs.version }}

            Distribution bundle for the Facebook Messenger (Personal) channel for GoClaw.

            **This is an experimental channel. Using it violates Meta ToS. Your Facebook account may be banned.**

            ## Contents

            - `goclaw-fbm-bundle-v*.tar.gz` — Cách 1: ready-to-run bundle with 3 Docker images
            - `goclaw-fbm-source-v*.tar.gz` — Cách 4: source tarball for local build

            See [RECIPIENT-README.md](https://github.com/${{ github.repository }}/blob/main/install-template/docs/RECIPIENT-README.md) for install instructions.
