name: Run VPS Command

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run inside goclaw container'
        required: true
        default: './goclaw onboard'
        type: choice
        options:
          - './goclaw onboard'
          - './goclaw migrate up'
          - 'create-tenant'
          - 'cat /app/data/.env.local'
          - 'custom'
      custom_command:
        description: 'Custom command (only if "custom" selected above)'
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Execute command on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 5m
          script: |
            cd /opt/goclaw

            CMD="${{ inputs.command }}"
            if [ "$CMD" = "custom" ]; then
              CMD="${{ inputs.custom_command }}"
            fi

            if [ "$CMD" = "create-tenant" ]; then
              echo "=== Creating default tenant via API ==="
              set -a && source .env.local && set +a
              TOKEN="${GOCLAW_GATEWAY_TOKEN}"

              # Create tenant
              RESULT=$(curl -sf -X POST http://127.0.0.1:18790/v1/tenants \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{"name":"Default","slug":"default"}')
              echo "Tenant created: ${RESULT}"

              # Add gateway user as admin to the tenant
              TENANT_ID=$(echo "${RESULT}" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
              echo "Tenant ID: ${TENANT_ID}"

              if [ -n "${TENANT_ID}" ]; then
                echo "=== Tenant ${TENANT_ID} created successfully ==="
                echo "Refresh https://agent.thekp3.com and login with your gateway token."
              else
                echo "=== Tenant may already exist, checking... ==="
                curl -sf http://127.0.0.1:18790/v1/tenants \
                  -H "Authorization: Bearer ${TOKEN}" | head -200
              fi
            else
              echo "=== Running: ${CMD} ==="
              docker compose \
                -f docker-compose.yml \
                -f docker-compose.postgres.yml \
                -f docker-compose.selfservice.yml \
                -f docker-compose.browser.yml \
                -f docker-compose.override.yml \
                exec -T goclaw ${CMD}
            fi
            echo "=== Done ==="
