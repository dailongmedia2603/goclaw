name: Run VPS Command

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run inside goclaw container'
        required: true
        default: './goclaw onboard'
        type: choice
        options:
          - './goclaw onboard'
          - './goclaw migrate up'
          - 'cat /app/data/.env.local'
          - 'custom'
      custom_command:
        description: 'Custom command (only if "custom" selected above)'
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Execute command on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 5m
          script: |
            cd /opt/goclaw

            CMD="${{ inputs.command }}"
            if [ "$CMD" = "custom" ]; then
              CMD="${{ inputs.custom_command }}"
            fi

            echo "=== Running: ${CMD} ==="
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.postgres.yml \
              -f docker-compose.selfservice.yml \
              -f docker-compose.browser.yml \
              -f docker-compose.override.yml \
              exec -T goclaw ${CMD}
            echo "=== Done ==="
