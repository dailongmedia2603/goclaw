name: Run VPS Command

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run inside goclaw container'
        required: true
        default: './goclaw onboard'
        type: choice
        options:
          - './goclaw onboard'
          - './goclaw migrate up'
          - 'create-tenant'
          - 'show-token'
          - 'custom'
      custom_command:
        description: 'Custom command (only if "custom" selected above)'
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Execute command on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 5m
          script: |
            cd /opt/goclaw

            CMD="${{ inputs.command }}"
            if [ "$CMD" = "custom" ]; then
              CMD="${{ inputs.custom_command }}"
            fi

            if [ "$CMD" = "show-token" ]; then
              echo "=== Gateway Token ==="
              cat /opt/goclaw/.env.local
              echo "=== Done ==="
              exit 0
            fi

            if [ "$CMD" = "create-tenant" ]; then
              echo "=== Creating default tenant via API ==="

              # Read token from .env.local
              TOKEN=$(grep GOCLAW_GATEWAY_TOKEN /opt/goclaw/.env.local | cut -d'=' -f2 | tr -d ' \r\n')
              echo "Token length: ${#TOKEN}"
              echo "Token prefix: ${TOKEN:0:8}..."

              # Test health first
              echo "--- Health check ---"
              curl -s http://127.0.0.1:18790/health
              echo ""

              # List existing tenants
              echo "--- Existing tenants ---"
              curl -s http://127.0.0.1:18790/v1/tenants \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json"
              echo ""

              # Create tenant (show full response including errors)
              echo "--- Creating tenant ---"
              RESULT=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST http://127.0.0.1:18790/v1/tenants \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{"name":"Default","slug":"default"}')
              echo "Response: ${RESULT}"
            else
              echo "=== Running: ${CMD} ==="
              docker compose \
                -f docker-compose.yml \
                -f docker-compose.postgres.yml \
                -f docker-compose.selfservice.yml \
                -f docker-compose.browser.yml \
                -f docker-compose.override.yml \
                exec -T goclaw ${CMD}
            fi
            echo "=== Done ==="
