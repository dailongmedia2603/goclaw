name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 20m
          envs: GH_TOKEN
          script: |
            set -e
            cd /opt/goclaw

            # Configure git credentials for private repo access
            git config credential.helper store
            echo "https://x-access-token:$GH_TOKEN@github.com" > ~/.git-credentials

            # Fetch and reset to avoid merge conflicts from VPS-local edits
            git fetch origin main
            git reset --hard origin/main

            # Load env and rebuild
            set -a && [ -f .env.local ] && source .env.local && set +a

            # Generate version from git: short hash + date (e.g. v20260405-d86af18)
            export GOCLAW_VERSION="v$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
            echo "Building version: $GOCLAW_VERSION"

            COMPOSE_FILES="-f docker-compose.yml -f docker-compose.postgres.yml -f docker-compose.selfservice.yml -f docker-compose.browser.yml -f docker-compose.override.yml"

            # Zero-downtime deploy: build first, then swap containers.
            # Old containers keep serving traffic until new ones are ready.
            docker compose $COMPOSE_FILES build --pull 2>/dev/null || true
            docker compose $COMPOSE_FILES up -d --remove-orphans

            # Clean up unused images to free disk space
            docker image prune -f 2>/dev/null || true

            echo "Deploy completed at $(date)"
