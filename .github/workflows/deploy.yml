name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/goclaw

            # Fetch and reset to avoid merge conflicts from VPS-local edits
            git fetch origin main
            git reset --hard origin/main

            # Load env and rebuild
            set -a && [ -f .env.local ] && source .env.local && set +a

            # Generate version from git: short hash + date (e.g. v20260405-d86af18)
            export GOCLAW_VERSION="v$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
            echo "Building version: $GOCLAW_VERSION"

            # Clean up stale containers before deploying
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.postgres.yml \
              -f docker-compose.selfservice.yml \
              -f docker-compose.browser.yml \
              -f docker-compose.override.yml \
              down --remove-orphans 2>/dev/null || true

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.postgres.yml \
              -f docker-compose.selfservice.yml \
              -f docker-compose.browser.yml \
              -f docker-compose.override.yml \
              up -d --build

            echo "Deploy completed at $(date)"
